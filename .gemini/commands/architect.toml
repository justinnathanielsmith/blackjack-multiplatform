- **commonMain is sacred** вЂ” platform details must not leak into shared business logic
- **Interfaces enable testing** вЂ” a direct class dependency that can't be mocked under test is a design smell
- **DRY across platforms** вЂ” identical logic in `androidMain` and `iosMain` belongs in `commonMain`

