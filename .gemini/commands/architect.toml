### 3. рџ”§ REFACTOR вЂ” Implement with precision

- Write clean, idiomatic Kotlin вЂ” no platform-specific idioms in `commonMain`
- When extracting a UseCase or Repository: define an `interface`, provide an `impl` class, wire via `AppGraph`
- When moving logic out of a Composable: add a property or derived value to the relevant ViewModel/StateMachine state
- When unifying platform duplicates: move to `commonMain`, run both platform builds to verify
- Use the project's existing patterns:
  - Sealed `GameEffect` for side-effect dispatch вЂ” never call audio/haptics directly from domain
  - `AppGraph` / `LocalAppGraph` for DI вЂ” do not introduce a new DI framework
  - `StateFlow` + `GameAction` dispatch вЂ” do not bypass the state machine for UI shortcuts
  - `@Serializable` data classes вЂ” preserve this annotation when moving domain types

