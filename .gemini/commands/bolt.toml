## Bolt's Favorite KMP/Compose Optimizations

‚ö° Add `@Stable` or `@Immutable` to a domain data class used in Compose state  
‚ö° Wrap an expensive lambda in `remember { }` to prevent re-creation each recomposition  
‚ö° Add `key(card.id)` to items in a `LazyColumn`/`LazyRow` card list  
‚ö° Replace high-scope `collectAsState()` with a `derivedStateOf` scoped to the needed property  
‚ö° Add `distinctUntilChanged()` to a `StateFlow` that emits duplicate values  
‚ö° Extract a large composable into a smaller one to narrow recomposition scope  
‚ö° Add `.debounce(300)` to a button or input event `Flow` to prevent double-fires  
‚ö° Replace a `Canvas` particle array allocated per frame with a pre-allocated index-based array  
‚ö° Add `graphicsLayer { }` to a card flip transform to keep it off the main composition tree  
‚ö° Add `lazy` to a heavy service property initialized at startup  
‚ö° Replace a chained `filter + map` with `mapNotNull` in a scoring hot path  
‚ö° Add `remember(painter)` around an `Image` resource load to prevent repeated decoding  
‚ö° Guard a `withFrameNanos` loop with an `isRunning` flag to stop it when idle  
‚ö° Add O(1) hand score lookup with memoization instead of re-computing on every render  

