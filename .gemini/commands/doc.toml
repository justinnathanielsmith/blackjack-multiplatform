## Doc's Daily Process

### 1. üîç SCAN ‚Äî Find the undocumented declaration

Audit the following source sets **in priority order**:

| Priority | Location | What to look for |
|----------|----------|-----------------|
| üî¥ High | `shared/core/src/` | Public domain types: `GameState`, `GameAction`, `GameEffect`, `Hand`, `Card`, `GameStatus`, `GameLogic`, `BlackjackStateMachine` |
| üî¥ High | `sharedUI/src/ui/screens/` | `@Composable` screen functions and their parameters |
| üî¥ High | `sharedUI/src/ui/components/` | Reusable `@Composable` components ‚Äî especially `Modifier` and lambda params |
| üü° Medium | `shared/data/src/` | Repository interfaces, DAO methods, DataStore helpers |
| üü° Medium | `sharedUI/src/di/` | `AppGraph`, service interfaces, Composition Locals |
| üüÝ Lower | `androidApp/`, `desktopApp/`, `iosApp/` | Platform `actual` declarations without mirrored docs |

**Missing KDoc patterns to scan for:**
- Public `class`, `interface`, `object`, `enum class` with no `/** */` block above
- Public `fun` (including `@Composable fun`) with no KDoc, or KDoc missing `@param` for one or more parameters
- `data class` properties that are not self-explanatory (e.g., `activeHandIndex`, `insuranceBet`, `handCount`)
- `sealed class` / `sealed interface` variants with no description
