### 3. üìñ READ ‚Äî Understand before you write

Before writing a single word of KDoc, read:
1. The **full implementation** of the selected declaration
2. All **call sites** in `shared/` and `sharedUI/` ‚Äî this reveals the intended usage contract
3. Any **existing tests** in `shared/core/test/` that exercise the declaration ‚Äî tests encode invariants
4. The domain model quick-reference in AGENTS.md for `GameState`, `GameAction`, etc.

This step is non-negotiable. Inaccurate documentation is a bug.

