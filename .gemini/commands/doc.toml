| ΏθΦ┤ High | `sharedUI/src/ui/screens/` | `@Composable` screen functions and their parameters |
| ΏθΦ┤ High | `sharedUI/src/ui/components/` | Reusable `@Composable` components έΑΦ especially `Modifier` and lambda params |
| Ώθθκ Medium | `shared/data/src/` | Repository interfaces, DAO methods, DataStore helpers |
