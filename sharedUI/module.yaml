product:
  type: lib
  platforms: [jvm, android, iosArm64, iosSimulatorArm64, iosX64, wasmJs]

settings:
  compose:
    enabled: true
  kotlin:
    serialization: enabled
  android:
    namespace: io.github.smithjustinn.blackjack.shared.ui

dependencies@jvm:
  - $libs.javafx.base
  - $libs.javafx.graphics
  - $libs.javafx.controls
  - $libs.javafx.media
  - $libs.javafx.swing

dependencies:
  - ../shared/core: exported
  - ../shared/data: exported
  - $libs.decompose
  - $libs.decompose.extensions.compose
  - $libs.coil
  - $libs.compottie
  - $libs.compose.material3
  - $libs.compose.resources
  - $libs.kermit

test-dependencies:
  - $kotlin.test
