product:
  type: lib
  platforms: [jvm, android, iosArm64, iosSimulatorArm64, iosX64]

settings:
  kotlin:
    serialization:
      enabled: true
  android:
    namespace: io.github.smithjustinn.blackjack.core

dependencies:
  - $libs.compose.runtime: exported
  - $libs.kotlinx.coroutines.core
  - $libs.kotlinx.serialization.core: exported
  - $libs.kotlinx.serialization.json: exported
  - $libs.kotlinx.datetime
  - $libs.kotlinx.collections.immutable
  - $libs.kermit
  - $libs.decompose
  - $libs.essenty.lifecycle

test-dependencies:
  - $libs.kotlinx.coroutines.test
  - $kotlin.test
  - $libs.turbine
