product:
  type: lib
  platforms: [jvm, android, iosArm64, iosSimulatorArm64, iosX64]

settings:
  kotlin:
    serialization:
      enabled: true
  android:
    namespace: io.github.smithjustinn.blackjack.data

dependencies:
  - ../core: exported
  - $libs.kotlinx.serialization.core: exported
  - $libs.kotlinx.serialization.json: exported
  - $libs.room.runtime
  - $libs.sqlite.bundled
  - $libs.datastore.preferences: exported

test-dependencies:
  - $libs.kotlinx.coroutines.test
  - $libs.turbine
  - $kotlin.test
